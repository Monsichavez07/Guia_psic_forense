<script>
const QUESTIONS = [
{tag:"Generalidades", q:"¿Qué es la Psicología Jurídica y qué procesos analiza?", opts:[
 "Rama aplicada que estudia el comportamiento humano en relación con normas, leyes e instituciones del sistema de justicia, analizando la toma de decisiones judiciales y el cumplimiento normativo.",
 "Disciplina que solo diagnostica trastornos mentales en reclusos.",
 "Subespecialidad que estudia únicamente el comportamiento delictivo.",
 "Rama de la criminología dedicada a la prevención del delito."
], correct:0, exp:"La Psicología Jurídica es la rama aplicada más amplia: estudia el comportamiento humano frente a normas, leyes e instituciones, incluyendo la toma de decisiones judiciales y el cumplimiento normativo. La Forense, Criminológica y Victimología son sus vertientes."},

{tag:"Generalidades", q:"¿Cómo se define la Psicología Forense dentro de la Psicología Jurídica?", opts:[
 "Como el estudio del origen social del delito.",
 "Como la subespecialidad de la psicología jurídica que realiza evaluaciones psicológicas con fines legales, respondiendo preguntas de jueces, fiscales o abogados mediante informes técnicos.",
 "Como el tratamiento terapéutico de personas privadas de la libertad.",
 "Como el estudio de la personalidad del delincuente."
], correct:1, exp:"La Psicología Forense es una subespecialidad aplicada: evalúa con fines legales (imputabilidad, credibilidad del testimonio, daño psíquico, riesgo de reincidencia) y responde a solicitudes de la autoridad judicial mediante informes técnicos basados en evidencia."},

{tag:"Generalidades", q:"¿Cuál es la función principal del psicólogo forense frente a jueces, fiscales o abogados?", opts:[
 "Ofrecer terapia al evaluado.",
 "Decidir la culpabilidad o inocencia del acusado.",
 "Responder preguntas específicas mediante informes técnicos basados en evidencia científica.",
 "Representar legalmente al acusado ante el tribunal."
], correct:2, exp:"El psicólogo forense no juzga ni brinda terapia: su función es responder preguntas legales concretas (imputabilidad, testimonio, daño, riesgo) mediante un informe técnico-científico dirigido a la autoridad."},

{tag:"Generalidades", q:"¿Cómo se define la Psicología Criminológica?", opts:[
 "Evaluación individual para decisión legal.",
 "Estudio de las víctimas del delito.",
 "Rama del derecho penal encargada de dictar sentencias.",
 "Área que estudia los factores psicológicos que influyen en la conducta delictiva: motivaciones, rasgos de personalidad, procesos cognitivos y aprendizaje social."
], correct:3, exp:"A diferencia de la Forense (que evalúa a un individuo para el tribunal), la Criminológica busca explicar por qué ocurre el delito, analizando motivaciones, personalidad, cognición y aprendizaje social."},

{tag:"Generalidades", q:"¿Cómo se define la Victimología?", opts:[
 "Disciplina científica que estudia a las víctimas del delito, sus características, el impacto psicológico de la victimización y su relación con el agresor.",
 "Estudia el origen social del delito en general.",
 "Evalúa la imputabilidad del acusado.",
 "Analiza el nivel de desarrollo moral del delincuente."
], correct:0, exp:"La Victimología se centra en la víctima: sus características, el daño psicológico sufrido, su relación con el agresor y la respuesta institucional, buscando prevención, atención y reparación."},

{tag:"Generalidades", q:"¿Cuál es la diferencia central entre Psicología Forense, Psicología Criminológica y Victimología?", opts:[
 "Forense = explicación del delito; Criminológica = evaluación para tribunales; Victimología = marco legal.",
 "Forense = evaluación para tribunales; Criminológica = explicación del delito; Victimología = estudio de la víctima.",
 "Las tres son sinónimos y se usan indistintamente.",
 "Forense = estudio de la víctima; Criminológica = marco legal; Victimología = evaluación para tribunales."
], correct:1, exp:"Cada vertiente responde una pregunta distinta: la Forense evalúa para el tribunal, la Criminológica explica el delito, y la Victimología estudia a la víctima."},

{tag:"Generalidades", q:"¿Por qué el sistema legal requiere evidencia psicológica válida en sus decisiones?", opts:[
 "Porque la ley lo exige únicamente en casos penales graves.",
 "Porque sustituye el testimonio de los testigos presenciales.",
 "Porque el sistema legal toma decisiones sobre personas y necesita interpretación científica del comportamiento humano.",
 "Porque determina automáticamente la sentencia del juez."
], correct:2, exp:"El sistema legal decide sobre personas; por ello requiere que esas decisiones se apoyen en evidencia psicológica válida, aportada por un profesional que interpreta el comportamiento humano con rigor científico."},

{tag:"Frenología", q:"¿Cuál es la definición de la frenología según sus postulados?", opts:[
 "Una técnica moderna de neuroimagen para localizar tumores cerebrales.",
 "Una disciplina jurídica que estudia el cráneo de los delincuentes con fines procesales.",
 "Una teoría que niega cualquier relación entre el cerebro y la conducta.",
 "Una teoría que postula que los aspectos psicológicos, intelectuales y morales dependen de la organización funcional del cerebro, y que cada facultad psicológica depende de una región cerebral específica."
], correct:3, exp:"La frenología sostenía que lo psicológico, intelectual y moral depende de la organización funcional del cerebro, y que cada facultad tiene asiento en una región cerebral cuyo desarrollo (masa) determina su calidad y grado."},

{tag:"Frenología", q:"¿Quién fue el fundador de la frenología?", opts:[
 "Franz Joseph Gall",
 "Pierre Paul Broca",
 "Carl Wernicke",
 "Marie Jean Pierre Flourens"
], correct:0, exp:"Franz Joseph Gall es reconocido como el fundador de la frenología, la doctrina que buscaba localizar facultades mentales en regiones específicas del cerebro."},

{tag:"Frenología", q:"¿Qué consideraba Gall respecto a las funciones mentales y el cerebro?", opts:[
 "Que las funciones mentales no tienen relación alguna con el cerebro.",
 "Que existían funciones mentales con una localización diferenciada en el cerebro.",
 "Que el cerebro funciona siempre como un todo indivisible, sin regiones especializadas.",
 "Que solo el hemisferio derecho controla la conducta humana."
], correct:1, exp:"Gall proponía que las funciones mentales estaban localizadas de forma diferenciada en distintas regiones del cerebro, idea central del localizacionismo frenológico."},

{tag:"Frenología", q:"Además de fundar la frenología, ¿qué otros aportes se le atribuyen a Gall?", opts:[
 "Descubrir el área de Broca y el área de Wernicke.",
 "Desarrollar la teoría del aprendizaje social del delito.",
 "Diferenciar materia blanca de materia gris y descubrir nervios craneales con origen en la médula espinal.",
 "Crear las etapas del desarrollo moral de Kohlberg."
], correct:2, exp:"Gall enfatizó el mayor desarrollo del lóbulo frontal en humanos, diferenció materia blanca de materia gris y descubrió nervios craneales con origen en la médula espinal."},

{tag:"Frenología", q:"Según la frenología, ¿de qué dependen los aspectos psicológicos, intelectuales y morales de una persona?", opts:[
 "De la educación recibida, exclusivamente.",
 "Únicamente del entorno social en que se desarrolla.",
 "De factores genéticos heredados solo por línea materna.",
 "De la organización funcional del cerebro."
], correct:3, exp:"La frenología planteaba que estos aspectos dependen de la organización funcional del cerebro, con cada facultad ligada a una región cerebral concreta."},

{tag:"Frenología", q:"Según la frenología, ¿de qué depende la calidad y el grado de una facultad psicológica?", opts:[
 "Del desarrollo de la masa cerebral asociada a la región correspondiente.",
 "No existe relación entre facultad y masa cerebral.",
 "Dependen únicamente de la edad de la persona.",
 "Dependen del tamaño total del cráneo, sin relación con regiones específicas."
], correct:0, exp:"Para la frenología, mientras mayor el desarrollo de la masa cerebral en la región asociada a una facultad, mayor la calidad y el grado de esa facultad psicológica."},

{tag:"Frenología", q:"¿Las facultades psicológicas, morales e intelectuales se consideraban innatas o adquiridas según la frenología?", opts:[
 "Adquiridas exclusivamente por aprendizaje durante la vida.",
 "Innatas, con posibilidad de ser heredadas.",
 "Determinadas solo por el ambiente en que se crece.",
 "Aparecen de forma aleatoria, sin patrón hereditario."
], correct:1, exp:"La frenología sostenía que estas facultades son innatas y con posibilidad de ser heredadas, no producto exclusivo del aprendizaje o el ambiente."},

{tag:"Frenología", q:"¿Qué crítica hizo Marie Jean Pierre Flourens al localizacionismo (como el de la frenología)?", opts:[
 "Apoyó totalmente los postulados de la frenología.",
 "Afirmó que el lenguaje se localiza únicamente en el área de Broca.",
 "Consideró imposible localizar con precisión las funciones cerebrales, ya que las estructuras cerebrales interactúan entre sí creando sistemas funcionales.",
 "Propuso la teoría del autocontrol aplicada al delito."
], correct:2, exp:"Flourens cuestionó el localizacionismo estricto: para él, las funciones cerebrales no podían aislarse en regiones exactas porque distintas estructuras interactúan formando sistemas funcionales."},

{tag:"Funciones y peritaje", q:"¿Cuáles son funciones propias del psicólogo forense?", opts:[
 "Brindar psicoterapia, prescribir medicación y dictar sentencia.",
 "Investigar la escena del crimen y recolectar evidencia física.",
 "Defender legalmente al imputado ante el juez.",
 "Evaluar estado mental, determinar capacidad cognitiva y volitiva, y analizar la credibilidad del testimonio."
], correct:3, exp:"Entre las funciones del psicólogo forense están evaluar el estado mental, determinar capacidad cognitiva/volitiva, analizar credibilidad del testimonio, evaluar daño psicológico y estimar riesgo de reincidencia."},

{tag:"Funciones y peritaje", q:"¿Qué es el peritaje psicológico y cuál es su finalidad jurídica?", opts:[
 "Es un medio de prueba que aporta información psicológica objetiva para ayudar al juzgador a comprender aspectos mentales/conductuales del caso, sin determinar culpabilidad ni inocencia.",
 "Es el instrumento que determina la culpabilidad o inocencia del acusado.",
 "Es un documento que sustituye a la sentencia judicial.",
 "Es un procedimiento exclusivo del derecho laboral."
], correct:0, exp:"El peritaje psicológico es el producto técnico-científico central del ejercicio forense: un medio de prueba que informa al juzgador, pero que no decide culpabilidad ni inocencia."},

{tag:"Funciones y peritaje", q:"¿Qué metodologías se consideran válidas dentro del peritaje psicológico?", opts:[
 "Lectura de cartas natales y grafología.",

const STORAGE_KEY = 'quiz_psicologia_forense_progress_v1';
const THEME_KEY = 'quiz_psicologia_forense_theme_v1';

let current = 0;
let answered = new Array(QUESTIONS.length).fill(null);

const qTag = document.getElementById('qTag');
const qText = document.getElementById('qText');
const optionsBox = document.getElementById('optionsBox');
const explainBox = document.getElementById('explainBox');
const stampText = document.getElementById('stampText');
const explainText = document.getElementById('explainText');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const scoreBadge = document.getElementById('scoreBadge');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const quizView = document.getElementById('quizView');
const summaryView = document.getElementById('summaryView');
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const themeLabel = document.getElementById('themeLabel');

const LETTERS = ['A','B','C','D'];

/* ---------- Persistencia de progreso ---------- */
function saveProgress(){
  try{
    const data = { current, answered };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }catch(e){ /* almacenamiento no disponible, se ignora silenciosamente */ }
}

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(Array.isArray(data.answered) && data.answered.length === QUESTIONS.length){
      answered = data.answered;
      current = Math.min(data.current || 0, QUESTIONS.length - 1);
      return true;
    }
  }catch(e){ /* dato corrupto, se ignora */ }
  return false;
}

function clearProgress(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
}

/* ---------- Modo claro / oscuro ---------- */
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  if(theme === 'dark'){
    themeIcon.textContent = '🌙';
    themeLabel.textContent = 'Modo oscuro';
  } else {
    themeIcon.textContent = '☀️';
    themeLabel.textContent = 'Modo claro';
  }
  try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
}

function loadTheme(){
  let theme = 'dark';
  try{
    const saved = localStorage.getItem(THEME_KEY);
    if(saved === 'light' || saved === 'dark') theme = saved;
    else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) theme = 'light';
  }catch(e){}
  applyTheme(theme);
}

themeToggle.addEventListener('click', () => {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

/* ---------- Render del quiz ---------- */
function renderQuestion(){
  const item = QUESTIONS[current];
  qTag.textContent = 'EVIDENCIA ' + String(current+1).padStart(2,'0') + ' · ' + item.tag.toUpperCase();
  qText.textContent = item.q;
  optionsBox.innerHTML = '';
  explainBox.classList.remove('show','ok','bad');

  item.opts.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.innerHTML = '<span class="letter">' + LETTERS[idx] + '</span><span>' + opt + '</span>';
    div.addEventListener('click', () => selectOption(idx));
    optionsBox.appendChild(div);
  });

  const prior = answered[current];
  if(prior !== null){
    lockOptions(prior, true);
  }

  progressFill.style.width = ((current) / (QUESTIONS.length-1) * 100) + '%';
  progressLabel.textContent = (current+1) + ' / ' + QUESTIONS.length;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = prior === null;
  nextBtn.textContent = current === QUESTIONS.length - 1 ? 'Cerrar expediente »' : 'Siguiente »';
  updateScore();
  saveProgress();
}

function selectOption(idx){
  if(answered[current] !== null) return;
  answered[current] = idx;
  lockOptions(idx, false);
  nextBtn.disabled = false;
  updateScore();
  saveProgress();
}

function lockOptions(selectedIdx, silent){
  const item = QUESTIONS[current];
  const opts = optionsBox.children;
  for(let i=0;i<opts.length;i++){
    opts[i].classList.add('locked');
    if(i === item.correct){
      opts[i].classList.add('correct');
    } else if(i === selectedIdx){
      opts[i].classList.add('incorrect');
    } else {
      opts[i].classList.add('dim');
    }
  }
  const isCorrect = selectedIdx === item.correct;
  explainBox.classList.add('show', isCorrect ? 'ok' : 'bad');
  stampText.textContent = isCorrect ? 'CORRECTO' : 'INCORRECTO';
  explainText.innerHTML = '<strong>Explicación:</strong> ' + item.exp;
}

function updateScore(){
  const correctCount = answered.reduce((acc, val, i) => acc + (val === QUESTIONS[i].correct ? 1 : 0), 0);
  scoreBadge.textContent = 'Aciertos: ' + correctCount;
}

prevBtn.addEventListener('click', () => {
  if(current > 0){ current--; renderQuestion(); }
});

nextBtn.addEventListener('click', () => {
  if(current < QUESTIONS.length - 1){
    current++;
    renderQuestion();
  } else {
    showSummary();
  }
});

function showSummary(){
  quizView.style.display = 'none';
  summaryView.style.display = 'block';
  const correctCount = answered.reduce((acc, val, i) => acc + (val === QUESTIONS[i].correct ? 1 : 0), 0);
  document.getElementById('finalScore').textContent = correctCount + '/' + QUESTIONS.length;
  let msg;
  const pct = correctCount / QUESTIONS.length;
  if(pct >= 0.9) msg = 'Dominio sólido del expediente. Perito calificado.';
  else if(pct >= 0.7) msg = 'Buen manejo del caso, revisa los puntos marcados en rojo.';
  else if(pct >= 0.5) msg = 'Vas por buen camino; conviene repasar las secciones falladas.';
  else msg = 'El expediente necesita más revisión antes de presentarlo ante el tribunal.';
  document.getElementById('finalMsg').textContent = msg;

  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  QUESTIONS.forEach((item, i) => {
    const ok = answered[i] === item.correct;
    const row = document.createElement('div');
    row.className = 'review-item ' + (ok ? 'ok' : 'bad');
    row.innerHTML = '<span class="dot"></span><span>' + String(i+1).padStart(2,'0') + '. ' + item.q.slice(0,70) + (item.q.length>70?'…':'') + '</span>';
    list.appendChild(row);
  });
}

function restartQuiz(){
  current = 0;
  answered = new Array(QUESTIONS.length).fill(null);
  clearProgress();
  summaryView.style.display = 'none';
  quizView.style.display = 'block';
  renderQuestion();
}

document.getElementById('restartBtn').addEventListener('click', restartQuiz);
document.getElementById('restartTopBtn').addEventListener('click', () => {
  if(confirm('¿Reiniciar el intento? Se perderá el progreso guardado.')){
    restartQuiz();
  }
});

/* ---------- Inicio ---------- */
loadTheme();
const hadProgress = loadProgress();
const allAnswered = answered.every(a => a !== null);
if(hadProgress && allAnswered){
  showSummary();
} else {
  renderQuestion();
}
</script>
